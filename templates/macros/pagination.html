{% macro pager(paginator) %}
{% if paginator %}
<nav >
  {% if paginator.previous %}
  <a href="{{ paginator.previous }}">Previous</a>
  {% else %}
  <span >Previous</span>
  {% endif %}
  <span >Page {{ paginator.current_index }} of {{ paginator.number_pagers }}</span>
  {% if paginator.next %}
  <a href="{{ paginator.next }}">Next</a>
  {% else %}
  <span >Next</span>
  {% endif %}
</nav>
{% endif %}
{% endmacro pager %}
