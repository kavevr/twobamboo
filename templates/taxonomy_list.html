{% extends "base.html" %}

{% block title %}{{ taxonomy.name | title }} | {{ config.title }}{% endblock title %}

{% block content %}
<section class="taxonomy-page">
  <h1>{{ taxonomy.name | title }}</h1>
  <ul class="term-list">
    {% for term in terms %}
    <li>
      <a href="{{ term.permalink | safe }}">
        <span>{{ term.name }}</span>
        <span>{{ term.page_count }}</span>
      </a>
    </li>
    {% endfor %}
  </ul>
</section>
{% endblock content %}
