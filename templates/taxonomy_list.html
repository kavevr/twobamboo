{% extends "base.html" %}

{% block title %}{{ taxonomy.name | title }} | {{ config.title }}{% endblock title %}

{% block content %}
<section>
  <h1>{{ taxonomy.name | title }}</h1>
  <ul>
    {% for term in terms %}
    <li>
      <a href="{{ term.permalink | safe }}">
        {{ term.name }} ({{ term.page_count }})
      </a>
    </li>
    {% endfor %}
  </ul>
</section>
{% endblock content %}
